<title>Siembra de Maíz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* ENCABEZADO */
header{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:20px;
}

/* CARRUSEL */
.slider{
    width:100%;
    height:450px;
    overflow:hidden;
    position:relative;
}

.slides{
    display:flex;
    width:400%;
    animation:slide 16s infinite;
}

.slides img{
    width:100%;
    height:450px;
    object-fit:cover;
}

@keyframes slide{
    0%{margin-left:0;}
    20%{margin-left:0;}

    25%{margin-left:-100%;}
    45%{margin-left:-100%;}

    50%{margin-left:-200%;}
    70%{margin-left:-200%;}

    75%{margin-left:-300%;}
    100%{margin-left:-300%;}
}

/* GALERÍA */
.galeria{
    padding:40px 20px;
}

.galeria h2{
    text-align:center;
    margin-bottom:20px;
    color:#2e7d32;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.grid img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    transition:0.3s;
}

.grid img:hover{
    transform:scale(1.05);
}

/* CONTACTO */
.contacto{
    text-align:center;
    padding:40px 20px;
}

.whatsapp{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:15px 25px;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
}

/* UBICACIÓN */
.ubicacion{
    padding:40px 20px;
}

.ubicacion h2{
    text-align:center;
    margin-bottom:20px;
    color:#2e7d32;
}

iframe{
    width:100%;
    height:400px;
    border:none;
}

/* PIE */
footer{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
